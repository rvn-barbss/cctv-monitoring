<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | CCTV Monitoring System</title>

    <!-- Tech Font -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            background:
                radial-gradient(circle at top left, rgba(0,180,255,0.18), transparent 25%),
                radial-gradient(circle at bottom right, rgba(0,255,170,0.10), transparent 25%),
                #050b14;
            position: relative;
        }

        /* Animated grid background */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: moveGrid 12s linear infinite;
        }

        @keyframes moveGrid {
            from {
                transform: translateY(0px);
            }
            to {
                transform: translateY(40px);
            }
        }

        /* Floating glow */
        body::after {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: rgba(0, 170, 255, 0.12);
            filter: blur(120px);
            border-radius: 50%;
            top: -200px;
            right: -100px;
        }

        .login-card {
            position: relative;
            width: 100%;
            max-width: 430px;
            padding: 45px;
            border-radius: 18px;

            background: rgba(10, 15, 25, 0.88);
            backdrop-filter: blur(16px);

            border: 1px solid rgba(0,255,255,0.15);

            box-shadow:
                0 0 25px rgba(0,255,255,0.08),
                0 0 60px rgba(0,140,255,0.12),
                0 20px 50px rgba(0,0,0,0.6);

            z-index: 2;
        }

        /* top line accent */
        .login-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;

            background: linear-gradient(
                90deg,
                #00e5ff,
                #0078ff,
                #00ffcc
            );

            border-radius: 18px 18px 0 0;
        }

        h2 {
            text-align: center;
            color: #ffffff;
            font-size: 34px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0,255,255,0.4);
        }

        .subtitle {
            text-align: center;
            color: #8ca0b3;
            font-size: 13px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .system-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;

            margin-bottom: 25px;

            color: #00ff99;
            font-size: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #00ff99;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff99;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.3);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #b9c6d3;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;

            border-radius: 10px;
            border: 1px solid rgba(0,255,255,0.1);

            background: rgba(255,255,255,0.03);
            color: #ffffff;

            outline: none;
            transition: all 0.3s ease;

            font-size: 14px;
            font-family: 'Share Tech Mono', monospace;
        }

        .input-field::placeholder {
            color: #607080;
        }

        .input-field:focus {
            border-color: #00d9ff;

            box-shadow:
                0 0 0 3px rgba(0,217,255,0.12),
                0 0 15px rgba(0,217,255,0.18);

            background: rgba(255,255,255,0.05);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;

            border: none;
            border-radius: 10px;

            background: linear-gradient(
                135deg,
                #0078ff,
                #00b7ff
            );

            color: white;
            font-size: 15px;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 1px;

            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);

            box-shadow:
                0 0 20px rgba(0,183,255,0.35),
                0 10px 30px rgba(0,120,255,0.3);
        }

        .footer-text {
            margin-top: 22px;
            text-align: center;
            font-size: 11px;
            color: #607080;
            letter-spacing: 1px;
        }

        .error {
            background: rgba(255, 76, 76, 0.12);
            color: #ff7b7b;
            border: 1px solid rgba(255, 76, 76, 0.25);

            padding: 12px;
            border-radius: 10px;
            text-align: center;

            margin-bottom: 18px;
            font-size: 13px;
        }

        @media (max-width: 500px) {
            .login-card {
                margin: 20px;
                padding: 35px 25px;
            }

            h2 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">

        <h2>CCTV ni Gilbert</h2>

        <p class="subtitle">
            ADVANCED CCTV MONITORING INTERFACE
        </p>

        <div class="system-status">
            <div class="status-dot"></div>
            SYSTEM ONLINE
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="error">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post">

            <div class="input-group">
                <label>ADMIN USERNAME</label>
                <input 
                    type="text" 
                    name="username" 
                    class="input-field"
                    placeholder="Enter Username"
                    required
                >
            </div>

            <div class="input-group">
                <label>SECURITY PASSWORD</label>
                <input 
                    type="password" 
                    name="password" 
                    class="input-field"
                    placeholder="Enter Password"
                    required
                >
            </div>

            <button type="submit" class="login-btn">
                LOGIN
            </button>

        </form>

        <div class="footer-text">
            SECURE ACCESS • ENCRYPTED CONNECTION • ACTIVE MONITORING
        </div>

    </div>

</body>
</html>
